## Credentials cho các kênh chat / voice
## Tham khảo thêm: https://rasa.com/docs/rasa/messaging-and-voice-channels

## REST API mặc định của Rasa (dùng /webhooks/rest/webhook)
rest:
  # kênh này không cần thêm credential gì

## Socket.IO – thường dùng để kết nối với frontend (React, Vue, v.v.)
socketio:
  user_message_evt: user_uttered
  bot_message_evt: bot_uttered
  session_persistence: true
  # cần cấu hình thêm phía client cho khớp namespace / path nếu bạn đổi

## Ví dụ các kênh khác (bật lên khi dùng tới)
# facebook:
#   verify: "<verify>"
#   secret: "<your secret>"
#   page-access-token: "<your page access token>"

# slack:
#   slack_token: "<your slack token>"
#   slack_channel: "<the slack channel>"
#   slack_signing_secret: "<your slack signing secret>"

# mattermost:
#   url: "https://<mattermost instance>/api/v4"
#   token: "<bot token>"
#   webhook_url: "<callback URL>"

## Nếu bạn không dùng Rasa X / Rasa Enterprise có thể bỏ qua phần này
# rasa:
#   url: "http://localhost:5002/api"
